<style>
     
    .honor-fade-section {
        opacity: 0;
        transform: translateY(40px);
        transition: opacity 0.8s cubic-bezier(0.16, 1, 0.3, 1), transform 0.8s cubic-bezier(0.16, 1, 0.3, 1);
        will-change: opacity, transform;
    }
    .honor-fade-section.is-visible {
        opacity: 1;
        transform: translateY(0);
    }

     
    @keyframes honorCardIn {
        0% { opacity: 0; transform: translateY(30px) scale(0.95); }
        100% { opacity: 1; transform: translateY(0) scale(1); }
    }
    .honor-card {
        animation: honorCardIn 0.6s cubic-bezier(0.16, 1, 0.3, 1) both;
        transition: transform 0.4s cubic-bezier(0.25, 0.8, 0.25, 1.2), box-shadow 0.4s;
    }
     
    .honor-card:nth-child(1) { animation-delay: 0.1s; }
    .honor-card:nth-child(2) { animation-delay: 0.2s; }
    .honor-card:nth-child(3) { animation-delay: 0.3s; }
    .honor-card:nth-child(4) { animation-delay: 0.4s; }
    .honor-card:nth-child(5) { animation-delay: 0.5s; }
    .honor-card:nth-child(6) { animation-delay: 0.6s; }

     
    .honor-card:hover {
        transform: translateY(-8px) rotateX(1deg) rotateY(-1deg);
        box-shadow: 0 25px 40px -12px rgba(163, 31, 52, 0.25), 0 0 0 2px rgba(163, 31, 52, 0.3);
    }

     
    .honor-card .card-bg {
        transition: transform 1.2s cubic-bezier(0.16, 1, 0.3, 1);
    }
    .honor-card:hover .card-bg {
        transform: scale(1.15);
    }

     
    .honor-card .card-info {
        transition: transform 0.4s cubic-bezier(0.25, 0.8, 0.25, 1.2);
    }
    .honor-card:hover .card-info {
        transform: translateY(-8px);
    }

     
    .honor-card .title-underline {
        width: 0;
        height: 2px;
        background: #A31F34;
        transition: width 0.5s ease;
    }
    .honor-card:hover .title-underline {

    .honor-card:hover .date-tag {
        color: rgba(255,255,255,1) !important;
        text-shadow: 0 0 8px rgba(255,255,255,0.6);
    }
</style>

<script>
    
    document.addEventListener('DOMContentLoaded', function() {
        const observer = new IntersectionObserver((entries, obs) => {
            entries.forEach(entry => {
                if (entry.isIntersecting) {
                    entry.target.classList.add('is-visible');
                    obs.unobserve(entry.target);
                }
            });
        }, { threshold: 0.15 });
        document.querySelectorAll('.honor-fade-section').forEach(el => observer.observe(el));
    });
</script>
